<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>轨迹查询网站</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Microsoft YaHei", "PingFang SC", "Helvetica Neue", sans-serif;
    background: #f0f2f5;
    color: #1a2332;
    min-height: 100vh;
  }
  .app { max-width: 800px; margin: 0 auto; padding: 24px 16px 60px; }

  /* 顶部 */
  .header { margin-bottom: 24px; }
  .header h1 {
    font-size: 22px; font-weight: 600; color: #1a2332;
    display: flex; align-items: center; gap: 8px;
  }
  .header-row {
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-row p { font-size: 14px; color: #6b7a90; }

  /* 语言切换 */
  .lang-btn {
    padding: 4px 12px; font-size: 13px; font-weight: 500;
    border: 1.5px solid #d0d8e4; border-radius: 8px;
    background: #fff; cursor: pointer; color: #4a5a70;
    transition: .15s; white-space: nowrap;
  }
  .lang-btn:hover { border-color: #4a7cf7; color: #4a7cf7; }
  .lang-btn.active { background: #4a7cf7; color: #fff; border-color: #4a7cf7; }

  /* 搜索栏 */
  .search-box {
    display: flex; gap: 8px; margin-bottom: 12px;
  }
  .search-box input {
    flex: 1; padding: 11px 16px; font-size: 15px;
    border: 1.5px solid #d0d8e4; border-radius: 10px;
    outline: none; background: #fff; transition: .2s;
  }
  .search-box input:focus {
    border-color: #4a7cf7;
    box-shadow: 0 0 0 3px rgba(74,124,247,0.12);
  }
  .search-box button {
    padding: 0 24px; font-size: 14px; font-weight: 500;
    border: none; border-radius: 10px; cursor: pointer;
    transition: .15s; white-space: nowrap;
  }
  .btn-search {
    background: #4a7cf7; color: #fff;
  }
  .btn-search:hover { background: #3a6ae0; }
  .btn-search:disabled { opacity: .5; cursor: not-allowed; }
  .btn-batch-mode {
    padding: 0 14px; font-size: 13px; font-weight: 500;
    border: 1.5px solid #d0d8e4; border-radius: 10px;
    background: #fff; cursor: pointer; transition: .15s; white-space: nowrap;
    color: #4a5a70;
  }
  .btn-batch-mode:hover { border-color: #4a7cf7; color: #4a7cf7; }
  .btn-batch-mode.active { background: #4a7cf7; color: #fff; border-color: #4a7cf7; }

  /* 批量查询面板 */
  .batch-panel {
    background: #fff; border: 1.5px solid #4a7cf7;
    border-radius: 12px; padding: 14px 16px;
    margin-bottom: 16px; display: none;
  }
  .batch-panel textarea {
    width: 100%; min-height: 80px; max-height: 200px;
    padding: 10px 12px; font-size: 14px; font-family: "SF Mono", "Menlo", monospace;
    border: 1.5px solid #d0d8e4; border-radius: 8px;
    outline: none; resize: vertical; transition: .2s;
    background: #fff; color: #1a2332;
  }
  .batch-panel textarea:focus {
    border-color: #4a7cf7;
    box-shadow: 0 0 0 3px rgba(74,124,247,0.12);
  }
  .batch-panel .batch-info {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 8px; gap: 8px;
  }
  .batch-panel .batch-info .hint {
    font-size: 12px; color: #9aabb8;
  }
  .btn-batch-cancel {
    background: transparent; color: #6b7a90;
    border: 1px solid #d0d8e4 !important;
  }
  .btn-batch-cancel:hover { border-color: #9aabb8; }

  /* 批量进度 */
  .batch-progress {
    display: none; margin-bottom: 12px;
  }
  .batch-progress-bar {
    height: 4px; background: #e0e6ee; border-radius: 2px;
    overflow: hidden; margin-bottom: 6px;
  }
  .batch-progress-bar .fill {
    height: 100%; width: 0%; background: #4a7cf7;
    border-radius: 2px; transition: width .3s;
  }
  .batch-progress-text {
    font-size: 12px; color: #6b7a90;
  }
  .batch-progress-text .count-done { color: #4a7cf7; font-weight: 600; }
  .batch-progress-text .count-fail { color: #e53935; }
  .batch-progress-text .count-total { color: #1a2332; font-weight: 600; }

  /* 工具栏 */
  .toolbar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; font-size: 13px; color: #6b7a90;
  }
  .toolbar .count { font-weight: 500; color: #1a2332; }
  .toolbar .actions { display: flex; gap: 8px; }
  .toolbar .actions button {
    padding: 6px 14px; font-size: 12px; border: 1px solid #d0d8e4;
    border-radius: 8px; background: #fff; cursor: pointer; transition: .15s;
    color: #4a5a70;
  }
  .toolbar .actions button:hover { border-color: #4a7cf7; color: #4a7cf7; }
  .toolbar .actions button:disabled { opacity: .4; cursor: not-allowed; }

  /* 卡片 */
  .card {
    background: #fff; border-radius: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
    margin-bottom: 12px; overflow: hidden;
    transition: box-shadow .2s;
  }
  .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.08); }
  .card-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 18px; cursor: pointer; user-select: none;
    border-bottom: 1px solid transparent;
  }
  .card-header .no {
    font-size: 16px; font-weight: 600; color: #1a2332;
    font-family: "SF Mono", "Menlo", monospace;
  }
  .card-header .status-tag {
    font-size: 12px; padding: 3px 10px; border-radius: 20px;
    font-weight: 500;
  }
  .status-tag.arriving { background: #fff8e1; color: #f57f17; }
  .status-tag.in_transit { background: #e3f2fd; color: #1565c0; }
  .status-tag.completed { background: #e8f5e9; color: #2e7d32; }
  .status-tag.fail { background: #fce4ec; color: #c62828; }
  .status-tag.pending { background: #f3e5f5; color: #7b1fa2; }
  .card-header .meta {
    font-size: 12px; color: #9aabb8;
    display: flex; align-items: center; gap: 12px;
  }
  .card-header .arrow {
    transition: transform .2s; font-size: 14px; color: #9aabb8;
  }
  .card-header .arrow.open { transform: rotate(180deg); }

  /* 卡片操作按钮 */
  .card-actions {
    display: flex; gap: 4px; align-items: center;
  }
  .card-actions button {
    padding: 4px 10px; font-size: 12px;
    border: 1px solid #e0e6ee; border-radius: 6px;
    background: #fff; cursor: pointer; color: #5a6a80; transition: .1s;
  }
  .card-actions button:hover { border-color: #4a7cf7; color: #4a7cf7; }
  .card-actions .btn-del:hover { border-color: #e53935; color: #e53935; }
  .card-actions button:disabled { opacity: .4; cursor: not-allowed; }

  /* 卡片正文 */
  .card-body { padding: 0 18px 0; display: none; }
  .card-body.open { display: block; padding: 0 18px 16px; }

  .event-list { list-style: none; position: relative; }
  .event-list::before {
    content: ''; position: absolute; left: 7px; top: 8px; bottom: 8px;
    width: 2px; background: #e0e6ee;
  }
  .event-item {
    display: flex; gap: 12px; padding: 6px 0;
    position: relative; align-items: flex-start;
  }
  .event-dot {
    width: 16px; height: 16px; flex-shrink: 0;
    border-radius: 50%; background: #d0d8e4; margin-top: 3px;
    position: relative; z-index: 1;
  }
  .event-item:first-child .event-dot {
    background: #4a7cf7; box-shadow: 0 0 0 3px rgba(74,124,247,.2);
  }
  .event-item:first-child .event-content { font-weight: 500; }
  .event-content { flex: 1; font-size: 14px; line-height: 1.6; color: #2a3a4a; }
  .event-time { font-size: 12px; color: #9aabb8; white-space: nowrap; margin-top: 1px; }

  .brief-status {
    font-size: 13px; color: #5a6a80; flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    margin: 0 12px;
  }
  .no-events { color: #9aabb8; font-size: 14px; padding: 12px 0; text-align: center; }

  /* empty */
  .empty {
    text-align: center; padding: 60px 20px; color: #9aabb8;
  }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* toast */
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: #1a2332; color: #fff; padding: 10px 24px; border-radius: 8px;
    font-size: 14px; opacity: 0; transition: .3s; pointer-events: none;
    white-space: nowrap; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) {
    .app { padding: 16px 12px; }
    .card-header { padding: 14px 14px; }
    .card-header .meta { display: none; }
    .brief-status { display: none; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>📦 轨迹查询网站</h1>
    <div class="header-row">
      <p id="subtitle">输入运单号查询货物轨迹</p>
      <button class="lang-btn" id="langToggle">EN</button>
    </div>
  </div>

  <div class="search-box">
    <input id="inputNo" type="text" placeholder="输入运单号，回车查询" autofocus>
    <button class="btn-search" id="btnSearch">查询</button>
    <button class="btn-batch-mode" id="btnBatchMode">📋 批量</button>
  </div>

  <!-- 批量查询面板 -->
  <div class="batch-panel" id="batchPanel">
    <textarea id="batchTextarea" placeholder="粘贴多个运单号，支持换行、逗号、分号分隔"></textarea>
    <div class="batch-info">
      <span class="hint" id="batchHint">检测到 0 个单号</span>
      <div style="display:flex;gap:6px;">
        <button class="btn-batch-cancel" id="btnBatchCancel" style="padding:6px 16px;font-size:13px;border:1px solid #d0d8e4;border-radius:8px;background:#fff;cursor:pointer;color:#4a5a70;">取消</button>
        <button class="btn-search" id="btnBatchSearch" style="padding:6px 16px;font-size:13px;" disabled>批量查询</button>
      </div>
    </div>
    <!-- 进度条 -->
    <div class="batch-progress" id="batchProgress">
      <div class="batch-progress-bar">
        <div class="fill" id="batchProgressFill"></div>
      </div>
      <div class="batch-progress-text" id="batchProgressText">
        查询中 <span class="count-done" id="batchDone">0</span>
        / <span class="count-total" id="batchTotal">0</span>
        <span class="count-fail" id="batchFail"></span>
      </div>
    </div>
  </div>

  <div class="toolbar" id="toolbar" style="display:none;">
    <span id="toolbarLabel">共 <span class="count" id="totalCount">0</span> 票</span>
    <div class="actions">
      <button id="btnRefreshAll">🔄 刷新全部</button>
    </div>
  </div>

  <div id="list"></div>
  <div class="empty" id="empty">
    <div class="icon">🔍</div>
    <p id="emptyText">暂无跟踪记录，输入运单号开始查询</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const inputNo = document.getElementById('inputNo');
const btnSearch = document.getElementById('btnSearch');
const listEl = document.getElementById('list');
const emptyEl = document.getElementById('empty');
const toolbar = document.getElementById('toolbar');
const totalCount = document.getElementById('totalCount');
const btnRefreshAll = document.getElementById('btnRefreshAll');
const toast = document.getElementById('toast');
const langToggle = document.getElementById('langToggle');
const subtitle = document.getElementById('subtitle');
const emptyText = document.getElementById('emptyText');
const toolbarLabel = document.getElementById('toolbarLabel');
const batchPanel = document.getElementById('batchPanel');
const batchTextarea = document.getElementById('batchTextarea');
const batchHint = document.getElementById('batchHint');
const btnBatchSearch = document.getElementById('btnBatchSearch');
const btnBatchCancel = document.getElementById('btnBatchCancel');
const btnBatchMode = document.getElementById('btnBatchMode');
const batchProgress = document.getElementById('batchProgress');
const batchProgressFill = document.getElementById('batchProgressFill');
const batchDone = document.getElementById('batchDone');
const batchTotal = document.getElementById('batchTotal');
const batchFail = document.getElementById('batchFail');
const batchProgressText = document.getElementById('batchProgressText');

let currentLang = localStorage.getItem('tracking_lang') || 'zh';
let batchNumbers = [];
let batchRunning = false;

// ---- 国际化 ----
function t(zh, en) {
  return currentLang === 'en' ? en : zh;
}

function updateLangUI() {
  langToggle.textContent = currentLang === 'zh' ? 'EN' : '中文';
  langToggle.classList.toggle('active', currentLang === 'en');
  subtitle.textContent = t('输入运单号查询货物轨迹', 'Track your cargo by waybill number');
  inputNo.placeholder = t('输入运单号，回车查询', 'Enter waybill No. & press Enter');
  btnSearch.textContent = t('查询', 'Track');
  emptyText.textContent = t('暂无跟踪记录，输入运单号开始查询', 'No records yet. Enter a waybill to start.');
  toolbarLabel.innerHTML = t('共 <span class="count" id="totalCount">0</span> 票', '<span class="count" id="totalCount">0</span> shipment(s)');
  btnRefreshAll.textContent = t('🔄 刷新全部', '🔄 Refresh all');
  btnBatchSearch.textContent = t('批量查询', 'Batch query');
  btnBatchCancel.textContent = t('取消', 'Cancel');
  btnBatchMode.textContent = t('📋 批量', '📋 Batch');
  batchTextarea.placeholder = t('粘贴多个运单号，支持换行、逗号、分号分隔', 'Paste waybill numbers, separated by new line, comma or semicolon');
  updateBatchBtn();
}

function toggleLang() {
  currentLang = currentLang === 'zh' ? 'en' : 'zh';
  localStorage.setItem('tracking_lang', currentLang);
  updateLangUI();
  render();
}

// ---- Toast ----
let toastTimer;
function showToast(msg, isError) {
  toast.textContent = msg;
  toast.style.background = isError ? '#c62828' : '#1a2332';
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
}

// ---- 批量查询 ----
function parseBatchInput(text) {
  const parts = text.split(/[\n,，;；、\s]+/).map(s => s.trim()).filter(Boolean);
  return [...new Set(parts)];
}

function updateBatchBtn() {
  const text = batchTextarea.value.trim();
  const numbers = text ? parseBatchInput(text) : [];
  batchHint.textContent = t(`检测到 ${numbers.length} 个单号`, `${numbers.length} number(s) detected`);
  btnBatchSearch.disabled = numbers.length < 2;
  if (numbers.length >= 2) {
    btnBatchSearch.textContent = t(`批量查询 ${numbers.length} 票`, `Batch (${numbers.length})`);
  } else {
    btnBatchSearch.textContent = t('批量查询', 'Batch query');
  }
  return numbers;
}

function toggleBatchMode(show) {
  if (show === undefined) show = batchPanel.style.display !== 'block';
  batchPanel.style.display = show ? 'block' : 'none';
  btnBatchMode.classList.toggle('active', show);
  if (show) {
    batchTextarea.focus();
    batchTextarea.value = '';
    batchProgress.style.display = 'none';
    updateBatchBtn();
  } else {
    batchTextarea.value = '';
  }
}

async function doBatchSearch() {
  const text = batchTextarea.value.trim();
  const numbers = parseBatchInput(text);
  if (numbers.length < 2) {
    showToast(t('请至少输入 2 个单号', 'Enter at least 2 numbers'), true);
    return;
  }
  if (batchRunning) return;
  batchRunning = true;
  btnBatchSearch.disabled = true;
  btnBatchSearch.textContent = t('查询中...', 'Querying...');
  batchProgress.style.display = 'block';
  batchTextarea.disabled = true;

  let done = 0, failed = 0;
  const total = numbers.length;
  batchDone.textContent = '0';
  batchTotal.textContent = total;
  batchFail.textContent = '';
  batchProgressFill.style.width = '0%';

  for (const no of numbers) {
    try {
      const result = await trackQuery(no);
      if (result.result === false) failed++;
    } catch { failed++; }
    done++;
    batchDone.textContent = done;
    batchProgressFill.style.width = `${(done / total) * 100}%`;
    if (failed > 0) {
      batchFail.textContent = t(` ${failed} 失败`, ` ${failed} failed`);
    }
  }

  batchRunning = false;
  batchTextarea.disabled = false;
  toggleBatchMode(false);
  render();

  if (failed === 0) {
    showToast(t(`✅ ${total} 票全部查询成功`, `✅ ${total} shipment(s) tracked`));
  } else {
    showToast(t(`✅ 完成，${failed} 票查询失败`, `✅ Done, ${failed} shipment(s) failed`), true);
  }
}

// ---- API 调用 ----
async function trackQuery(no) {
  const res = await fetch('/api/track', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: `no=${encodeURIComponent(no)}`,
  });
  return res.json();
}

async function getHistory() {
  const res = await fetch('/api/history');
  return res.json();
}

async function deleteHistory(no) {
  const res = await fetch(`/api/history/${encodeURIComponent(no)}`, { method: 'DELETE' });
  return res.json();
}

async function refreshAllFn() {
  const res = await fetch('/api/refresh-all', { method: 'POST' });
  return res.json();
}

// ---- 状态与渲染 ----
function getLatestEvent(item) {
  if (!item || !item.dataDict || !item.dataDict.list || item.dataDict.list.length === 0) return null;
  return item.dataDict.list[0];
}

function extractEstimatedDate(content) {
  if (!content) return null;
  // 匹配: 预计 2026-06-01、预计 06-01、预计到达时间 2026-06-01、ETA 2026-06-01
  const m = content.match(/(\d{4}[-/]\d{1,2}[-/]\d{1,2})/);
  if (m) {
    const d = new Date(m[1].replace(/\//g, '-'));
    if (!isNaN(d)) return d;
  }
  // 匹配 MM-DD 格式（无年份）
  const m2 = content.match(/预计.*?(\d{1,2})[-/](\d{1,2})/);
  if (m2) {
    const d = new Date();
    d.setMonth(parseInt(m2[1]) - 1, parseInt(m2[2]));
    d.setHours(0, 0, 0, 0);
    return d;
  }
  return null;
}

function calcStatus(item) {
  if (!item || item.result === false) return 'fail';
  const ev = getLatestEvent(item);
  if (!ev) return 'pending';
  const content = (ev.content || ev.content_loc || '');
  const contentEn = (ev.content_en || '');

  // 已签收/已到港 → 已完成
  if (/已签收|已到港|已到目的地|已到仓库/.test(content)) return 'completed';
  if (/delivered|signed for|arrived at (destination|warehouse)/i.test(contentEn)) return 'completed';

  // 尝试从内容中提取预计到港日期
  const dateText = content || contentEn;
  const eta = extractEstimatedDate(dateText);

  if (eta) {
    const now = new Date();
    now.setHours(0, 0, 0, 0);
    const diffDays = Math.ceil((eta - now) / (1000 * 60 * 60 * 24));
    if (diffDays >= 0 && diffDays <= 3) return 'arriving';  // 快到港
    return 'in_transit';  // 运输中
  }

  // 没有日期，根据关键词判断
  if (/预计|中转|安排|运输途中/.test(content)) return 'in_transit';
  if (/estimated|in transit|scheduled|on the way/i.test(contentEn)) return 'in_transit';
  return 'in_transit';
}

function statusLabel(s) {
  if (currentLang === 'en') {
    if (s === 'arriving') return 'Arriving';
    if (s === 'in_transit') return 'In Transit';
    if (s === 'completed') return 'Completed';
    if (s === 'fail') return 'Failed';
    return 'Pending';
  }
  if (s === 'arriving') return '快到港';
  if (s === 'in_transit') return '运输中';
  if (s === 'completed') return '已完成';
  if (s === 'fail') return '查询失败';
  return '待更新';
}

function eventContent(ev) {
  if (!ev) return '';
  if (currentLang === 'en') return ev.content_en || ev.content_loc || ev.content || '';
  return ev.content || ev.content_loc || '';
}

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const pad = n => n.toString().padStart(2, '0');
  return `${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function formatEventTime(t) {
  if (!t) return '';
  // 格式: /Date(1716518400000+0800)/ 或 ISO
  if (typeof t === 'string' && t.startsWith('/Date(')) {
    const ms = parseInt(t.match(/\d+/)[0]);
    return formatTime(new Date(ms).toISOString());
  }
  return formatTime(t);
}

function render() {
  getHistory().then(history => {
    const entries = Object.entries(history);
    if (entries.length === 0) {
      emptyEl.style.display = 'block';
      listEl.innerHTML = '';
      toolbar.style.display = 'none';
      return;
    }
    emptyEl.style.display = 'none';
    toolbar.style.display = 'flex';
    totalCount.textContent = entries.length;

    // 按 updatedAt 降序排列
    entries.sort((a, b) => (b[1].updatedAt || '').localeCompare(a[1].updatedAt || ''));

    let html = '';
    for (const [no, item] of entries) {
      const status = calcStatus(item.result);
      const latest = getLatestEvent(item.result);
      const lastUpdate = formatTime(item.updatedAt);
      const events = (item.result && item.result.dataDict && item.result.dataDict.list) || [];

      const briefText = latest ? eventContent(latest) : '';
      const updateLabel = t('更新', 'Updated');

      html += `
        <div class="card" data-no="${no.replace(/"/g, '&quot;')}">
          <div class="card-header" onclick="toggleCard(this)">
            <div style="display:flex;align-items:center;gap:10px;min-width:0;flex:1;">
              <span class="no">${escHtml(no)}</span>
              <span class="status-tag ${status}">${statusLabel(status)}</span>
              ${briefText ? `<span class="brief-status">${escHtml(briefText)}</span>` : ''}
            </div>
            <div style="display:flex;align-items:center;gap:12px;">
              <span class="meta">${lastUpdate ? updateLabel + ' ' + lastUpdate : ''}</span>
              <span class="card-actions">
                <button onclick="refreshOne('${escHtml(no)}', this)" title="${t('刷新', 'Refresh')}">🔄</button>
                <button class="btn-del" onclick="deleteOne('${escHtml(no)}', this)" title="${t('删除', 'Delete')}">✕</button>
              </span>
              <span class="arrow">▾</span>
            </div>
          </div>
          <div class="card-body">
            ${events.length === 0 ? `<div class="no-events">${t('暂无轨迹信息', 'No tracking info yet')}</div>` : ''}
            <ul class="event-list">
              ${events.map(ev => `
                <li class="event-item">
                  <div class="event-dot"></div>
                  <div class="event-content">${escHtml(eventContent(ev))}</div>
                  <div class="event-time">${formatEventTime(ev.created)}</div>
                </li>
              `).join('')}
            </ul>
          </div>
        </div>`;
    }
    listEl.innerHTML = html;
  }).catch(() => showToast(t('加载历史失败', 'Failed to load history'), true));
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function toggleCard(header) {
  const body = header.nextElementSibling;
  const arrow = header.querySelector('.arrow');
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

// ---- 操作 ----
async function doSearch(no) {
  no = no.trim();
  if (!no) { showToast(t('请输入运单号', 'Please enter a waybill number'), true); return; }
  btnSearch.disabled = true;
  btnSearch.textContent = t('查询中...', 'Tracking...');
  try {
    const result = await trackQuery(no);
    if (result.result === false) {
      showToast(result.info || t('查询失败', 'Query failed'), true);
    } else {
      showToast(t('✅ 查询成功', '✅ Success'));
    }
    render();
  } catch { showToast(t('网络错误', 'Network error'), true); }
  btnSearch.disabled = false;
  btnSearch.textContent = t('查询', 'Track');
  inputNo.value = '';
  inputNo.focus();
}

async function refreshOne(no, btn) {
  btn.disabled = true;
  btn.textContent = '...';
  try {
    const result = await trackQuery(no);
    if (result.result === false) showToast(result.info || t('刷新失败', 'Refresh failed'), true);
    else showToast(t('✅ 已刷新', '✅ Refreshed'));
    render();
  } catch { showToast(t('刷新失败', 'Refresh failed'), true); render(); }
}

async function deleteOne(no, btn) {
  if (!confirm(t(`确定删除 ${no} 的跟踪记录？`, `Delete tracking record for ${no}?`))) return;
  await deleteHistory(no);
  render();
}

btnRefreshAll.addEventListener('click', async () => {
  btnRefreshAll.disabled = true;
  btnRefreshAll.textContent = t('刷新中...', 'Refreshing...');
  try {
    await refreshAllFn();
    showToast(t('✅ 全部已刷新', '✅ All refreshed'));
    render();
  } catch { showToast(t('部分刷新失败', 'Some failed'), true); render(); }
  btnRefreshAll.disabled = false;
  btnRefreshAll.textContent = t('🔄 刷新全部', '🔄 Refresh all');
});

// ---- 事件绑定 ----
btnSearch.addEventListener('click', () => {
  toggleBatchMode(false);
  doSearch(inputNo.value);
});

inputNo.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    toggleBatchMode(false);
    doSearch(inputNo.value);
  }
});

btnBatchMode.addEventListener('click', () => toggleBatchMode());
batchTextarea.addEventListener('input', updateBatchBtn);

btnBatchSearch.addEventListener('click', doBatchSearch);
btnBatchCancel.addEventListener('click', () => {
  if (batchRunning) return;
  toggleBatchMode(false);
});
btnBatchCancel.disabled = false;

langToggle.addEventListener('click', toggleLang);

// ---- 加载 ----
updateLangUI();
render();
</script>
</body>
</html>
